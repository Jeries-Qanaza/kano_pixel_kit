<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pixel Controller</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            touch-action: none;
        }
        #controls { margin-bottom: 15px; display: flex; gap: 10px; }
        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            background-color: #00adb5;
            color: white;
            cursor: pointer;
        }
        button:active { opacity: 0.8; }
        #clear-btn { background-color: #ff2e63; }
        #color-picker {
            width: 50px; height: 45px; border: none; border-radius: 8px; background: none;
        }
        #grid {
            display: grid;
            grid-template-columns: repeat(16, 1fr);
            gap: 2px;
            width: 100%;
            max-width: 600px;
            background-color: #222831;
            padding: 4px;
            border-radius: 8px;
        }
        .cell {
            aspect-ratio: 1;
            background-color: #393e46;
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <div id="controls">
        <button id="connect-btn">Connect Kit</button>
        <input type="color" id="color-picker" value="#00ff00">
        <button id="clear-btn">Clear</button>
    </div>

    <div id="grid"></div>

    <script>
        const WIDTH = 16, HEIGHT = 8;
        const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
        const CHAR_UUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
        
        let txCharacteristic = null;
        const grid = document.getElementById('grid');
        const colorPicker = document.getElementById('color-picker');

        // Draw Interactive Grid Map
        for (let y = 0; y < HEIGHT; y++) {
            for (let x = 0; x < WIDTH; x++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.dataset.x = x;
                cell.dataset.y = y;
                grid.appendChild(cell);
            }
        }

        // Web Bluetooth Logic
        document.getElementById('connect-btn').addEventListener('click', async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'KanoPixelKit' }],
                    optionalServices: [SERVICE_UUID]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                txCharacteristic = await service.getCharacteristic(CHAR_UUID);
                document.getElementById('connect-btn').innerText = "Connected! 🟢";
                document.getElementById('connect-btn').style.backgroundColor = "#4caf50";
            } catch (err) {
                console.error(err);
                alert("Connection failed: " + err.message);
            }
        });

        // Universal Paint Handler
        function paintCell(target) {
            if (!target.classList.contains('cell')) return;
            
            const hex = colorPicker.value;
            target.style.backgroundColor = hex;
            
            const r = parseInt(hex.slice(1,3), 16);
            const g = parseInt(hex.slice(3,5), 16);
            const b = parseInt(hex.slice(5,7), 16);
            const x = parseInt(target.dataset.x);
            const y = parseInt(target.dataset.y);

            if (txCharacteristic) {
                const payload = new Uint8Array([x, y, r, g, b]);
                txCharacteristic.writeValueWithResponse(payload).catch(e => console.log(e));
            }
        }

        // Handle Touch Drag Drawing for Mobile
        grid.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            if (target) paintCell(target);
        }, { passive: false });

        grid.addEventListener('touchstart', (e) => {
            paintCell(e.target);
        });

        // Clear Screen Functionality
        document.getElementById('clear-btn').addEventListener('click', () => {
            document.querySelectorAll('.cell').forEach(cell => cell.style.backgroundColor = '#393e46');
            if (txCharacteristic) {
                // Flash an empty array framework or loop logic on chip to wipe
                for(let y=0; y<HEIGHT; y++) {
                    for(let x=0; x<WIDTH; x++) {
                        txCharacteristic.writeValueWithoutResponse(new Uint8Array([x, y, 0, 0, 0]));
                    }
                }
            }
        });
    </script>
</body>
</html>
