<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kano Pixel Matrix Controller</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }
        h2 { margin-top: 5px; margin-bottom: 15px; font-weight: 500; color: #e0e0e0; }
        #controls { 
            margin-bottom: 20px; 
            display: flex; 
            gap: 12px; 
            align-items: center;
            width: 100%;
            max-width: 500px;
        }
        button {
            flex: 2;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            background-color: #2f80ed;
            color: white;
            cursor: pointer;
            transition: transform 0.1s ease, background-color 0.2s;
        }
        button:active { transform: scale(0.98); }
        #clear-btn { flex: 1; background-color: #eb5757; }
        #color-wrapper {
            position: relative;
            width: 50px;
            height: 48px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #333;
        }
        #color-picker {
            position: absolute;
            top: -5px; left: -5px; width: 60px; height: 60px;
            border: none; background: none; cursor: pointer;
        }
        #grid {
            display: grid;
            grid-template-columns: repeat(16, 1fr);
            gap: 3px;
            width: 100%;
            max-width: 500px;
            background-color: #1a1a1a;
            padding: 8px;
            border-radius: 12px;
            border: 1px solid #2d2d2d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .cell {
            aspect-ratio: 1;
            background-color: #2a2a2a;
            border-radius: 4px;
            transition: background-color 0.05s ease;
        }
    </style>
</head>
<body>

    <h2>Pixel Drawing Canvas</h2>

    <div id="controls">
        <button id="connect-btn">Connect Pixel Kit</button>
        <div id="color-wrapper">
            <input type="color" id="color-picker" value="#00ff00">
        </div>
        <button id="clear-btn">Clear</button>
    </div>

    <div id="grid"></div>

    <script>
        const WIDTH = 16, HEIGHT = 8;
        const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
        const CHAR_UUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
        
        let txCharacteristic = null;
        const grid = document.getElementById('grid');
        const colorPicker = document.getElementById('color-picker');
        const connectBtn = document.getElementById('connect-btn');

        // Dynamically assemble the 16x8 responsive HTML layout structure
        for (let y = 0; y < HEIGHT; y++) {
            for (let x = 0; x < WIDTH; x++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.dataset.x = x;
                cell.dataset.y = y;
                grid.appendChild(cell);
            }
        }

        // Web Bluetooth connectivity via Direct Service Matching Engine
        connectBtn.addEventListener('click', async () => {
            try {
                connectBtn.innerText = "Searching...";
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [SERVICE_UUID] }]
                });
                
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                txCharacteristic = await service.getCharacteristic(CHAR_UUID);
                
                connectBtn.innerText = "Connected 🟢";
                connectBtn.style.backgroundColor = "#27ae60";
            } catch (err) {
                console.error(err);
                connectBtn.innerText = "Connect Pixel Kit";
                alert("Pairing failed. Make sure your hardware is powered on and within range.");
            }
        });

        // Processes physical inputs and updates downstream connected components
        function paintCell(target) {
            if (!target || !target.classList.contains('cell')) return;
            
            const hex = colorPicker.value;
            // Prevent redundant over-the-air duplicate updates if drawing on the same block
            if (target.style.backgroundColor === hex) return;
            
            target.style.backgroundColor = hex;
            
            const r = parseInt(hex.slice(1,3), 16);
            const g = parseInt(hex.slice(3,5), 16);
            const b = parseInt(hex.slice(5,7), 16);
            const x = parseInt(target.dataset.x);
            const y = parseInt(target.dataset.y);

            if (txCharacteristic) {
                const payload = new Uint8Array([x, y, r, g, b]);
                txCharacteristic.writeValueWithoutResponse(payload).catch(e => console.log("Write error:", e));
            }
        }

        // Event triggers handling mobile screen drag/swipe painting smoothly
        grid.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            paintCell(target);
        }, { passive: false });

        grid.addEventListener('touchstart', (e) => {
            paintCell(e.target);
        });

        // Event triggers handling mouse drag painting for computer testing
        let isMouseDown = false;
        grid.addEventListener('mousedown', (e) => { isMouseDown = true; paintCell(e.target); });
        grid.addEventListener('mouseover', (e) => { if (isMouseDown) paintCell(e.target); });
        window.addEventListener('mouseup', () => { isMouseDown = false; });

        // Clears web panel board state and instructs downstream module array matrices to wipe
        document.getElementById('clear-btn').addEventListener('click', async () => {
            document.querySelectorAll('.cell').forEach(cell => cell.style.backgroundColor = '');
            if (txCharacteristic) {
                // Iterates clean instruction vectors to clear out active illumination grids completely
                for(let y=0; y<HEIGHT; y++) {
                    for(let x=0; x<WIDTH; x++) {
                        await txCharacteristic.writeValueWithoutResponse(new Uint8Array([x, y, 0, 0, 0]));
                    }
                }
            }
        });
    </script>
</body>
</html>
